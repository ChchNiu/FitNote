  <text x="32" y="164" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16" fill="#6B7280">记录每一次训练，看见自己的进步。</text>

  <rect x="32" y="198" width="326" height="128" rx="12" fill="#F3F4F6"/>
